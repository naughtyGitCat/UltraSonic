name: Build MSI Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WiX Toolset v5
        run: dotnet tool install --global wix --version 5.0.2

      # ── Build React Frontend ─────────────────────────────────
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React Frontend
        working-directory: src/LrWallPaper.React
        run: |
          npm ci
          npm run build

      # ── Publish ──────────────────────────────────────────────

      - name: Publish LrWallPaper (Master)
        run: >
          dotnet publish src/LrWallPaper/LrWallPaper.csproj
          -c Release -r win-x64 --self-contained
          -o publish/LrWallPaper

      - name: Publish LrWallPaper.Agent
        run: >
          dotnet publish src/LrWallPaper.Agent/LrWallPaper.Agent.csproj
          -c Release -r win-x64 --self-contained
          -o publish/LrWallPaper.Agent

      # ── Build MSI ───────────────────────────────────────────

      - name: Build LrWallPaper MSI
        run: >
          wix build
          installer/LrWallPaper.wxs
          -d PublishDir=publish\LrWallPaper
          -arch x64
          -o output/UltraSonic.LrWallPaper.msi

      - name: Build LrWallPaper.Agent MSI
        run: >
          wix build
          installer/LrWallPaper.Agent.wxs
          -d PublishDir=publish\LrWallPaper.Agent
          -arch x64
          -o output/UltraSonic.LrWallPaper.Agent.msi

      # ── Upload ──────────────────────────────────────────────

      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msi-installers
          path: output/*.msi

      # ── Release (only on tag push) ─────────────────────────

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/UltraSonic.LrWallPaper.msi
            output/UltraSonic.LrWallPaper.Agent.msi
          generate_release_notes: true
