name: Build MSI Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WiX Toolset v5
        run: dotnet tool install --global wix

      - name: Add WiX heat extension
        run: wix extension add WixToolset.Heat.wixext

      # ── Publish ──────────────────────────────────────────────

      - name: Publish LrWallPaper (Master)
        run: >
          dotnet publish src/LrWallPaper/LrWallPaper.csproj
          -c Release -r win-x64 --self-contained
          -o publish/LrWallPaper

      - name: Publish LrWallPaper.Agent
        run: >
          dotnet publish src/LrWallPaper.Agent/LrWallPaper.Agent.csproj
          -c Release -r win-x64 --self-contained
          -o publish/LrWallPaper.Agent

      # ── Heat: harvest publish output into WiX fragments ─────

      - name: Heat LrWallPaper files
        run: >
          wix heat dir publish/LrWallPaper
          -cg PublishFiles -dr INSTALLDIR -srd -sreg -ag -sfrag
          -var var.PublishDir
          -o installer/LrWallPaper.Files.wxs

      - name: Heat LrWallPaper.Agent files
        run: >
          wix heat dir publish/LrWallPaper.Agent
          -cg PublishFiles -dr INSTALLDIR -srd -sreg -ag -sfrag
          -var var.PublishDir
          -o installer/LrWallPaper.Agent.Files.wxs

      # ── Build MSI ───────────────────────────────────────────

      - name: Build LrWallPaper MSI
        run: >
          wix build
          installer/LrWallPaper.wxs
          installer/LrWallPaper.Files.wxs
          -d PublishDir=publish/LrWallPaper
          -arch x64
          -o output/UltraSonic.LrWallPaper.msi

      - name: Build LrWallPaper.Agent MSI
        run: >
          wix build
          installer/LrWallPaper.Agent.wxs
          installer/LrWallPaper.Agent.Files.wxs
          -d PublishDir=publish/LrWallPaper.Agent
          -arch x64
          -o output/UltraSonic.LrWallPaper.Agent.msi

      # ── Upload ──────────────────────────────────────────────

      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msi-installers
          path: output/*.msi

      # ── Release (only on tag push) ─────────────────────────

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/UltraSonic.LrWallPaper.msi
            output/UltraSonic.LrWallPaper.Agent.msi
          generate_release_notes: true
